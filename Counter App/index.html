<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>counter app</title>
    <style>
        
        div {
            z-index: 1;
            width: 600px;
            height: 500px;
            margin-left: -300px;
            position: relative;
            left: 50%;
            top: 50px;
            background-color: blue;
            text-align: center;
            color: white;
            font-family: sans-serif;
            box-shadow: 7px 7px 5px black;
        }

        p {
            font-size: 70px;
            position: relative;
            top: 40px;
            font-weight: 500;
        }

        #button2 {
            display: block;
            background-color: rgb(23, 23, 145);
            width: 160px;
            font-size: 18px;
            height: 30px;
            margin-left: -80px;
            position: relative;
            top: 50px;
            left: 50%;
            color: white;
            border-radius: 7px;
            box-shadow: 2px 2px 5px black;
        }

        #button1 {
            display: block;
            background-color: rgb(23, 23, 145);
            width: 160px;
            font-size: 18px;
            height: 30px;
            margin-left: -80px;
            position: relative;
            top: 35px;
            left: 50%;
            color: white;
            border-radius: 7px;
            box-shadow: 2px 2px 5px black;
        }

        h1 {
            position: relative;
            top: 40px;
            color: white;
            font-size: 48px;
            font-family: monospace;
        }
    
    </style>
</head>

<body>
    <div>
        <h1>Counter</h1>
        <p id="para"></p>
        <button id="button1" onclick="bu1()">Add Count</button>
        <button id="button2">Lower Count</button>
    </div>

    <script>
        document.getElementById('para').innerText = 0

        function numberCounter() {
            if (Number(document.getElementById('para').innerText) > 0) {
                document.getElementById('para').style.color = "green"
            } else if (Number(document.getElementById('para').innerText) < 0) {
                document.getElementById('para').style.color = "red"
            } else if (Number(document.getElementById('para').innerText) == 0) {
                document.getElementById('para').style.color = "white"
            }
        }
        document.getElementById('button1').addEventListener("click", function () {
            document.getElementById('para').innerText = Number(document.getElementById('para').innerText) + Number(1)
            numberCounter()
        })

        document.getElementById('button2').addEventListener("click", function () {
            document.getElementById('para').innerText = Number(document.getElementById('para').innerText) - Number(1)
            numberCounter()
        })
    </script>
</body>

</html>
